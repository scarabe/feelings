<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feelings Game</title>
<meta name="description" content="A fun English feelings vocabulary game for primary school students.">
<meta name="theme-color" content="#1a1008">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Feelings">
<link rel="manifest" href="manifest.webmanifest">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5ede0;--card:#fffaf5;--card2:#f0e4d0;
  --gold:#d4820a;--gold2:#b86800;
  --ink:#2a1a08;--ink2:#6a4820;--ink3:#a07840;
  --green:#2a8040;--r:18px;
  --sh:0 4px 20px rgba(80,40,0,0.12);
  --trans:all .22s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:16px 12px 32px;max-width:520px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:8px;flex-wrap:wrap;}
.title{font-size:clamp(18px,5vw,26px);font-weight:bold;letter-spacing:.02em;color:var(--gold2);}
.score-row{display:flex;gap:8px;}
.pill{background:var(--card);border-radius:30px;padding:5px 14px;font-size:13px;font-weight:bold;border:1.5px solid var(--card2);font-family:system-ui,sans-serif;}
.pill .n{color:var(--gold);}
.level-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.lvl-badge{padding:5px 18px;border-radius:30px;font-size:13px;font-weight:bold;border:2px solid var(--card2);color:var(--ink3);background:var(--card);transition:var(--trans);cursor:default;font-family:system-ui,sans-serif;}
.lvl-badge.active{border-color:var(--gold);color:var(--gold);}
.lvl-badge.done{border-color:var(--green);color:var(--green);}
.lvl-badge.locked{opacity:.35;}
.threshold-note{font-size:11px;color:var(--ink3);font-style:italic;font-family:system-ui,sans-serif;}
.mode-tabs{display:flex;gap:6px;margin-bottom:14px;}
.tab{padding:7px 20px;border-radius:30px;border:none;font-family:'Georgia',serif;font-size:13px;font-weight:bold;cursor:pointer;transition:var(--trans);color:var(--ink3);background:var(--card);flex:1;}
.tab.active{background:var(--gold);color:#3a1a00;}
.prog-track{background:var(--card);border-radius:6px;height:5px;margin-bottom:18px;overflow:hidden;}
.prog-bar{height:100%;background:var(--gold);border-radius:6px;transition:width .4s ease;width:0%;}
.q-card{background:var(--card);border-radius:var(--r);padding:20px 18px 16px;margin-bottom:14px;box-shadow:var(--sh);border:1px solid var(--card2);}
.q-num{font-size:11px;color:var(--ink3);margin-bottom:10px;font-family:system-ui,sans-serif;letter-spacing:.06em;text-transform:uppercase;}
.q-sentence{font-size:clamp(17px,4.5vw,22px);line-height:1.6;color:var(--ink);min-height:54px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;}
.q-pro{color:var(--gold2);font-weight:bold;}
.q-verb{color:var(--gold);font-style:italic;}
.q-blank{display:inline-block;min-width:90px;border-bottom:2.5px solid var(--gold);color:transparent;padding:0 4px;transition:var(--trans);border-radius:4px 4px 0 0;font-weight:bold;}
.q-blank.correct{background:#1a4020;color:#7de87d;border-color:var(--green);}
.q-blank.also-correct{background:#3a3000;color:var(--gold);border-color:var(--gold);}
.q-blank.wrong{background:#4a0a00;color:#ff8060;border-color:#e04020;}
.q-context{font-size:15px;color:var(--ink2);font-style:italic;}
.drop-target{display:inline-block;min-width:100px;border-bottom:2.5px dashed var(--gold);padding:2px 8px;border-radius:4px 4px 0 0;transition:var(--trans);font-weight:bold;color:transparent;}
.drop-target.drag-over{background:rgba(245,166,35,.15);}
.drop-target.correct{background:#1a4020;color:#7de87d;border-color:var(--green);}
.drop-target.also-correct{background:#3a3000;color:var(--gold);border-color:var(--gold);}
.drop-target.wrong{background:#4a0a00;color:#ff8060;border-color:#e04020;}
.face-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;margin-bottom:14px;}
.face-btn{background:transparent;border:2.5px solid transparent;border-radius:16px;padding:0;cursor:pointer;transition:var(--trans);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
.face-btn:hover:not(:disabled){transform:translateY(-3px);filter:brightness(1.1);}
.face-btn:disabled{cursor:default;}
.face-inner{width:100%;padding:10px 8px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;border-radius:14px 14px 0 0;}
.face-word{font-family:system-ui,sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 4px 6px;width:100%;text-align:center;border-radius:0 0 12px 12px;transition:var(--trans);}
.face-btn.correct .face-inner{outline:3px solid var(--green);}
.face-btn.correct .face-word{background:#1a4020;color:#7de87d;}
.face-btn.also-correct .face-inner{outline:3px solid var(--gold);}
.face-btn.also-correct .face-word{background:#3a2a00;color:var(--gold);}
.face-btn.wrong .face-inner{outline:3px solid #e04020;}
.face-btn.wrong .face-word{background:#4a0a00;color:#ff8060;}
.drag-zone{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.drag-chip{padding:8px 16px;border-radius:30px;background:var(--card2);border:2px solid var(--ink3);cursor:grab;transition:var(--trans);font-family:system-ui,sans-serif;font-size:14px;font-weight:700;color:var(--ink);user-select:none;letter-spacing:.04em;}
.drag-chip:hover{border-color:var(--gold);color:var(--gold);}
.drag-chip.dragging{opacity:.4;}
.drag-chip.used{opacity:.3;pointer-events:none;}
.also-correct-chip{border-color:var(--gold)!important;color:var(--gold)!important;}
.btn-next{display:none;width:100%;padding:13px;border-radius:var(--r);border:none;background:var(--gold);color:#3a1a00;font-size:16px;font-weight:bold;font-family:'Georgia',serif;cursor:pointer;transition:var(--trans);margin-bottom:14px;}
.btn-next.visible{display:block;}
.btn-next:hover{background:var(--gold2);}
.lvl-result{display:none;background:var(--card);border-radius:var(--r);padding:28px 20px;text-align:center;box-shadow:var(--sh);}
.lvl-result.show{display:block;}
.res-emoji{font-size:52px;margin-bottom:8px;}
.res-stars{font-size:28px;color:var(--gold);letter-spacing:4px;margin-bottom:8px;}
.res-title{font-size:24px;font-weight:bold;color:var(--gold2);margin-bottom:6px;}
.res-score{font-size:15px;color:var(--ink2);margin-bottom:6px;font-family:system-ui,sans-serif;}
.res-sub{font-size:13px;color:var(--ink3);margin-bottom:22px;font-family:system-ui,sans-serif;}
.res-btns{display:flex;gap:10px;flex-wrap:wrap;}
.res-btn{flex:1;padding:11px;border-radius:var(--r);border:2px solid var(--card2);background:var(--card2);color:var(--ink);font-size:14px;font-weight:bold;font-family:'Georgia',serif;cursor:pointer;transition:var(--trans);}
.res-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.res-btn:disabled{opacity:.3;cursor:default;}
.res-btn.primary{background:var(--gold);color:#3a1a00;border-color:var(--gold);}
.res-btn.primary:hover{background:var(--gold2);}
.trophy-screen{display:none;background:var(--card);border-radius:var(--r);padding:36px 20px;text-align:center;box-shadow:var(--sh);}
.trophy-screen.show{display:block;}
.trophy-icon{font-size:64px;margin-bottom:12px;}
.trophy-title{font-size:26px;font-weight:bold;color:var(--gold2);margin-bottom:8px;}
.trophy-score{font-size:15px;color:var(--ink2);margin-bottom:22px;font-family:system-ui,sans-serif;}
.trophy-btn{padding:13px 32px;border-radius:var(--r);border:none;background:var(--gold);color:#3a1a00;font-size:16px;font-weight:bold;font-family:'Georgia',serif;cursor:pointer;transition:var(--trans);}
.trophy-btn:hover{background:var(--gold2);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border-radius:30px;padding:10px 22px;font-size:14px;font-family:system-ui,sans-serif;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;border:1.5px solid var(--card2);z-index:100;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:#1a4020;border-color:var(--green);color:#a0e8a0;}
.toast.also{background:#3a2a00;border-color:var(--gold);color:var(--gold);}
.toast.bad{background:#4a0a00;border-color:#e04020;color:#ff9070;}
</style>
</head>
<body>

<div class="topbar">
  <div class="title">Feelings ✦</div>
  <div class="score-row">
    <div class="pill">✓ <span class="n" id="score-ok">0</span></div>
    <div class="pill">✗ <span class="n" id="score-bad">0</span></div>
    <div class="pill" id="pill-q">Q <span class="n" id="q-idx">1</span>/<span class="n" id="q-total">?</span></div>
  </div>
</div>
<div class="level-bar">
  <div class="lvl-badge active" id="badge-1">Level 1</div>
  <div class="lvl-badge locked" id="badge-2">Level 2 <span class="lock">🔒</span></div>
  <div class="lvl-badge locked" id="badge-3">Level 3 <span class="lock">🔒</span></div>
  <span class="threshold-note">80% to unlock next</span>
</div>
<div class="mode-tabs">
  <button class="tab active" id="tab-a" onclick="switchMode('a')">Choose</button>
  <button class="tab" id="tab-b" onclick="switchMode('b')">Drag</button>
</div>
<div class="prog-track"><div class="prog-bar" id="progress"></div></div>
<div class="q-card" id="q-card">
  <div class="q-num" id="q-num">Question 1</div>
  <div class="q-sentence" id="q-sentence"></div>
</div>
<div class="face-grid" id="mode-a"></div>
<div class="drag-zone" id="mode-b" style="display:none"></div>
<button class="btn-next" id="btn-next" onclick="nextQuestion()">Next ➜</button>
<div class="lvl-result" id="lvl-result">
  <div class="res-emoji" id="res-emoji"></div>
  <div class="res-stars" id="res-stars"></div>
  <div class="res-title" id="res-title"></div>
  <div class="res-score" id="res-score"></div>
  <div class="res-sub" id="res-sub"></div>
  <div class="res-btns">
    <button class="res-btn" onclick="retryLevel()">↺ Retry</button>
    <button class="res-btn primary" id="btn-next-lvl" onclick="startNextLevel()">Level 2 ➜</button>
    <button class="res-btn" onclick="fullRestart()">⟳ Start over</button>
  </div>
</div>
<div class="trophy-screen" id="trophy-screen">
  <div class="trophy-icon">🏆</div>
  <div class="trophy-title">All levels complete!</div>
  <div class="trophy-score" id="trophy-score"></div>
  <button class="trophy-btn" onclick="fullRestart()">Play again ↺</button>
</div>
<div class="toast" id="toast"></div>

<script>
const SA='#F2C07A',SB='#DEB890',SC='#ECA870',SD='#E8C0A0',SE='#D4A870',SF='#C89060';
const Hd='<path d="M12,38 Q14,10 40,8 Q66,10 68,38 Q60,20 40,18 Q20,20 12,38Z" fill="#2A1008"/>';
const Hb='<path d="M12,38 Q14,10 40,8 Q66,10 68,38 Q60,20 40,18 Q20,20 12,38Z" fill="#5C3418"/>';
const Ha='<path d="M12,38 Q14,10 40,8 Q66,10 68,38 Q60,20 40,18 Q20,20 12,38Z" fill="#7A3810"/>';
const Hd2='<path d="M12,40 Q10,16 40,10 Q70,16 68,40 Q58,22 40,20 Q22,22 12,40Z" fill="#2A1A0A"/>';
const Hsp='<path d="M12,38 Q14,10 40,8 Q66,10 68,38" fill="#1A1020"/><polygon points="20,22 16,4 28,20" fill="#1A1020"/><polygon points="40,16 38,0 44,16" fill="#1A1020"/><polygon points="58,22 64,4 52,20" fill="#1A1020"/>';
const Hsh='<path d="M12,40 Q14,12 40,10 Q66,12 68,40 Q60,22 40,20 Q20,22 12,40Z" fill="#4A2808"/>';
const Hcu='<path d="M12,40 Q10,16 40,10 Q70,16 68,40 Q58,22 40,20 Q22,22 12,40Z" fill="#5A2808"/><path d="M14,36 Q20,28 26,32" fill="none" stroke="#5A2808" stroke-width="3" stroke-linecap="round"/>';
function E(s){return '<ellipse cx="11" cy="52" rx="5" ry="7" fill="'+s+'"/><ellipse cx="69" cy="52" rx="5" ry="7" fill="'+s+'"/>';}
function N(s){return '<rect x="33" y="74" width="14" height="12" rx="5" fill="'+(s||SA)+'" opacity=".85"/>';}
function H(s){return '<ellipse cx="40" cy="48" rx="30" ry="33" fill="'+s+'"/>';}
function C(x1,y1,x2,y2){return '<path d="M'+(x1-6)+','+y1+' Q'+x1+','+(y1-8)+' '+(x1+6)+','+y1+'" fill="none" stroke="#2A1200" stroke-width="2.5" stroke-linecap="round"/><path d="M'+(x2-6)+','+y2+' Q'+x2+','+(y2-8)+' '+(x2+6)+','+y2+'" fill="none" stroke="#2A1200" stroke-width="2.5" stroke-linecap="round"/>';}
function Os(x1,y1,x2,y2,sk,p,sh){p=p||4;sh=sh||1.5;return '<ellipse cx="'+x1+'" cy="'+y1+'" rx="7" ry="8" fill="white"/><circle cx="'+x1+'" cy="'+(y1+2)+'" r="'+p+'" fill="#2A1200"/><circle cx="'+(x1+1.5)+'" cy="'+y1+'" r="'+sh+'" fill="white"/><ellipse cx="'+x2+'" cy="'+y2+'" rx="7" ry="8" fill="white"/><circle cx="'+x2+'" cy="'+(y2+2)+'" r="'+p+'" fill="#2A1200"/><circle cx="'+(x2+1.5)+'" cy="'+y2+'" r="'+sh+'" fill="white"/>';}
function HL(x1,y1,x2,y2,sk){return Os(x1,y1,x2,y2,sk,4,1.5)+'<path d="M'+(x1-7)+','+(y1-1)+' Q'+x1+','+(y1-8)+' '+(x1+7)+','+(y1-1)+'" fill="'+sk+'" stroke="none"/><path d="M'+(x2-7)+','+(y2-1)+' Q'+x2+','+(y2-8)+' '+(x2+7)+','+(y2-1)+'" fill="'+sk+'" stroke="none"/>';}
function ns(c){return '<path d="M37,60 Q40,64 43,60" fill="none" stroke="'+(c||'#C47840')+'" stroke-width="1.5" stroke-linecap="round"/>';}
function sv(body){return '<svg viewBox="0 0 80 90" width="72" xmlns="http://www.w3.org/2000/svg">'+body+'</svg>';}

const FACES={
  happy:{bg:'#F5A623',wc:'#6B3800',svg:sv(N(SA)+H(SA)+Hd+E(SA)+'<ellipse cx="22" cy="58" rx="8" ry="5" fill="#F0875A" opacity=".35"/><ellipse cx="58" cy="58" rx="8" ry="5" fill="#F0875A" opacity=".35"/>'+C(28,46,52,46)+ns()+'<path d="M24,66 Q40,80 56,66" fill="none" stroke="#2A1200" stroke-width="2.2" stroke-linecap="round"/><path d="M28,67 Q40,76 52,67" fill="white" stroke="none" opacity=".7"/>')},
  sad:{bg:'#6A9FCF',wc:'#0D2840',svg:sv(N(SB)+H(SB)+Hd+E(SB)+'<path d="M22,40 Q28,44 34,40" fill="none" stroke="#2A1200" stroke-width="2" stroke-linecap="round"/><path d="M46,40 Q52,44 58,40" fill="none" stroke="#2A1200" stroke-width="2" stroke-linecap="round"/>'+Os(29,48,51,48,SB,4,1.5)+'<path d="M23,48 Q29,44 35,48" fill="'+SB+'" stroke="none"/><path d="M45,48 Q51,44 57,48" fill="'+SB+'" stroke="none"/><ellipse cx="26" cy="59" rx="1.5" ry="4" fill="#AACCEE" opacity=".8"/><ellipse cx="48" cy="60" rx="1.5" ry="4" fill="#AACCEE" opacity=".8"/>'+ns('#A07850')+'<path d="M26,70 Q40,63 54,70" fill="none" stroke="#2A1200" stroke-width="2.2" stroke-linecap="round"/>')},
  angry:{bg:'#E04A2F',wc:'#4A0800',svg:sv(N(SC)+H(SC)+Hd+E(SC)+'<ellipse cx="40" cy="48" rx="28" ry="30" fill="#F09060" opacity=".25"/><ellipse cx="20" cy="60" rx="9" ry="6" fill="#E02000" opacity=".3"/><ellipse cx="60" cy="60" rx="9" ry="6" fill="#E02000" opacity=".3"/><path d="M20,38 L34,46" fill="none" stroke="#2A0800" stroke-width="3" stroke-linecap="round"/><path d="M46,46 L60,38" fill="none" stroke="#2A0800" stroke-width="3" stroke-linecap="round"/><path d="M22,50 Q29,46 36,50" fill="none" stroke="#2A0800" stroke-width="2.5" stroke-linecap="round"/><path d="M44,50 Q51,46 58,50" fill="none" stroke="#2A0800" stroke-width="2.5" stroke-linecap="round"/>'+ns('#A05030')+'<path d="M24,70 Q40,65 56,70" fill="none" stroke="#2A0800" stroke-width="2.2" stroke-linecap="round"/><line x1="29" y1="70" x2="29" y2="67" stroke="#2A0800" stroke-width="1.5"/><line x1="36" y1="68" x2="36" y2="65" stroke="#2A0800" stroke-width="1.5"/><line x1="44" y1="68" x2="44" y2="65" stroke="#2A0800" stroke-width="1.5"/><line x1="51" y1="70" x2="51" y2="67" stroke="#2A0800" stroke-width="1.5"/>')},
  scared:{bg:'#9B6DC5',wc:'#200840',svg:sv(N(SD)+H(SD)+'<polygon points="20,22 16,4 28,20" fill="#1A1020"/><polygon points="40,16 38,0 44,16" fill="#1A1020"/><polygon points="58,22 64,4 52,20" fill="#1A1020"/>'+E(SD)+'<path d="M18,36 Q26,28 34,36" fill="none" stroke="#281840" stroke-width="2" stroke-linecap="round"/><path d="M46,36 Q54,28 62,36" fill="none" stroke="#281840" stroke-width="2" stroke-linecap="round"/><ellipse cx="27" cy="50" rx="8" ry="9" fill="white"/><circle cx="27" cy="52" r="5" fill="#281840"/><circle cx="25" cy="50" r="2" fill="white"/><ellipse cx="53" cy="50" rx="8" ry="9" fill="white"/><circle cx="53" cy="52" r="5" fill="#281840"/><circle cx="51" cy="50" r="2" fill="white"/>'+ns('#B09070')+'<path d="M26,64 Q30,69 34,64 Q38,69 42,64 Q46,69 50,64 Q54,69 58,64" fill="none" stroke="#281840" stroke-width="2" stroke-linecap="round"/>')},
  excited:{bg:'#F06292',wc:'#5A001A',svg:sv(N(SC)+H(SC)+Hcu+E(SC)+'<ellipse cx="20" cy="60" rx="9" ry="6" fill="#F06080" opacity=".4"/><ellipse cx="60" cy="60" rx="9" ry="6" fill="#F06080" opacity=".4"/><ellipse cx="28" cy="49" rx="8" ry="8" fill="white"/><ellipse cx="52" cy="49" rx="8" ry="8" fill="white"/><text x="28" y="53" font-size="11" text-anchor="middle" fill="#E03060" font-family="serif">★</text><text x="52" y="53" font-size="11" text-anchor="middle" fill="#E03060" font-family="serif">★</text>'+ns('#C07040')+'<path d="M22,70 Q40,85 58,70" fill="#FF8899" stroke="#2A0812" stroke-width="2" stroke-linecap="round"/><path d="M28,71 Q40,80 52,71" fill="white" stroke="none"/><text x="8" y="44" font-size="10" fill="#FFD166" font-family="serif">✦</text><text x="64" y="38" font-size="8" fill="#FFD166" font-family="serif">✦</text>')},

let mode='a',curLevel=1,order=[],qIdx=0,scoreOk=0,scoreBad=0,answered=false,dragWord=null,curSentences=[],curWords=[];
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function updateBadges(){for(let l=1;l<=3;l++){const b=document.getElementById('badge-'+l);b.className='lvl-badge';if(l===curLevel)b.classList.add('active');else if(unlocked[l])b.classList.add('done');else b.classList.add('locked');const lk=b.querySelector('.lock');if(lk)lk.style.display=unlocked[l]||l===curLevel?'none':'';}}
function startLevel(lvl){curLevel=lvl;scoreOk=scoreBad=0;qIdx=0;answered=false;curSentences=buildLevelSentences(lvl);curWords=LEVEL_ADJS[lvl];order=shuffle([...Array(curSentences.length).keys()]);['score-ok','score-bad'].forEach(id=>document.getElementById(id).textContent=0);document.getElementById('q-total').textContent=curSentences.length;document.getElementById('lvl-result').classList.remove('show');document.getElementById('trophy-screen').classList.remove('show');document.getElementById('q-card').style.display='';document.getElementById('pill-q').style.display='';document.getElementById('progress').style.width='0%';document.body.style.backgroundColor='#f5ede0';updateBadges();renderQuestion();}
function retryLevel(){startLevel(curLevel);}
function startNextLevel(){startLevel(curLevel+1);}
function fullRestart(){unlocked[2]=false;unlocked[3]=false;startLevel(1);}
function switchMode(m){mode=m;document.getElementById('tab-a').classList.toggle('active',m==='a');document.getElementById('tab-b').classList.toggle('active',m==='b');startLevel(curLevel);}
function renderQuestion(){answered=false;document.getElementById('btn-next').classList.remove('visible');const total=curSentences.length,s=curSentences[order[qIdx]];document.getElementById('q-num').textContent='Question '+(qIdx+1)+' / '+total;document.getElementById('q-idx').textContent=qIdx+1;document.getElementById('progress').style.width=(qIdx/total*100)+'%';setEmotionBg(s.adj);mode==='a'?renderModeA(s):renderModeB(s);}
function sHTML(s,blank){return '<span class="q-pro">'+s.pronoun+'</span> <span class="q-verb">'+s.verb+'</span> '+blank+' <span class="q-context">'+s.context+'</span>';}
function renderModeA(s){document.getElementById('mode-a').style.display='';document.getElementById('mode-b').style.display='none';document.getElementById('q-sentence').innerHTML=sHTML(s,'<span class="q-blank" id="the-blank">___</span>');const grid=document.getElementById('mode-a');grid.innerHTML='';shuffle([...curWords]).forEach(name=>{const f=FACES[name];if(!f)return;const btn=document.createElement('button');btn.className='face-btn';btn.dataset.name=name;btn.innerHTML='<div class="face-inner" style="background:'+f.bg+'">'+f.svg+'</div><div class="face-word" style="background:'+f.wc+';color:white">'+name+'</div>';btn.onclick=()=>handleFaceClick(name,s.adj,btn);grid.appendChild(btn);});}
function handleFaceClick(chosen,correct,btn){if(answered)return;answered=true;const s=curSentences[order[qIdx]],also=s.also||[],blank=document.getElementById('the-blank');document.querySelectorAll('.face-btn').forEach(b=>{b.disabled=true;if(b.dataset.name===correct)b.classList.add('correct');if(also.includes(b.dataset.name))b.classList.add('also-correct');});if(chosen===correct){blank.textContent=correct;blank.classList.add('correct');scoreOk++;document.getElementById('score-ok').textContent=scoreOk;showToast('✓ Well done!','ok');}else if(also.includes(chosen)){btn.classList.remove('also-correct');btn.classList.add('also-correct');blank.textContent=chosen;blank.classList.add('also-correct');scoreOk++;document.getElementById('score-ok').textContent=scoreOk;showToast('✓ Also correct! Best: '+correct,'also',true);}else{btn.classList.add('wrong');blank.textContent=chosen;blank.classList.add('wrong');scoreBad++;document.getElementById('score-bad').textContent=scoreBad;showToast('✗ It was: '+correct+(also.length?' (also: '+also.join(', ')+')':''),'bad');}document.getElementById('btn-next').classList.add('visible');document.getElementById('btn-next').textContent=qIdx+1>=curSentences.length?'See results ✦':'Next ➜';}
function renderModeB(s){document.getElementById('mode-a').style.display='none';document.getElementById('mode-b').style.display='';document.getElementById('q-sentence').innerHTML=sHTML(s,'<span class="drop-target" id="the-drop" ondragover="dragOver(event)" ondrop="dropWord(event)"></span>');const zone=document.getElementById('mode-b');zone.innerHTML='';shuffle([...curWords]).forEach(w=>{const c=document.createElement('div');c.className='drag-chip';c.textContent=w;c.dataset.word=w;c.draggable=true;c.ondragstart=()=>{dragWord=w;c.classList.add('dragging');};c.ondragend=()=>c.classList.remove('dragging');c.onclick=()=>handleChipClick(w,s.adj);zone.appendChild(c);});}
function dragOver(e){e.preventDefault();document.getElementById('the-drop').classList.add('drag-over');}
function dropWord(e){e.preventDefault();if(!answered)handleChipClick(dragWord,curSentences[order[qIdx]].adj);}
function handleChipClick(chosen,correct){if(answered)return;answered=true;const s=curSentences[order[qIdx]],also=s.also||[],drop=document.getElementById('the-drop');drop.classList.remove('drag-over');drop.textContent=chosen;document.querySelectorAll('.drag-chip').forEach(c=>{c.style.pointerEvents='none';if(c.dataset.word===correct)c.style.border='2px solid #60c860';if(also.includes(c.dataset.word))c.classList.add('also-correct-chip');if(c.dataset.word===chosen)c.classList.add('used');});if(chosen===correct){drop.classList.add('correct');scoreOk++;document.getElementById('score-ok').textContent=scoreOk;showToast('✓ Well done!','ok');}else if(also.includes(chosen)){drop.classList.add('also-correct');scoreOk++;document.getElementById('score-ok').textContent=scoreOk;showToast('✓ Also correct! Best: '+correct,'also',true);}else{drop.classList.add('wrong');scoreBad++;document.getElementById('score-bad').textContent=scoreBad;showToast('✗ It was: '+correct+(also.length?' (also: '+also.join(', ')+')':''),'bad');}document.getElementById('btn-next').classList.add('visible');document.getElementById('btn-next').textContent=qIdx+1>=curSentences.length?'See results ✦':'Next ➜';}
function nextQuestion(){clearToast();qIdx++;qIdx>=curSentences.length?showLevelResult():renderQuestion();}
function showLevelResult(){const total=curSentences.length,pct=scoreOk/total,pctPc=Math.round(pct*100),passed=pct>=THRESHOLD;['q-card','mode-a','mode-b'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('btn-next').classList.remove('visible');document.getElementById('pill-q').style.display='none';document.getElementById('progress').style.width='100%';let emoji,stars,title,sub;if(pctPc===100){emoji='✦';stars='★★★';title='Perfect!';}else if(pctPc>=80){emoji='🎉';stars='★★☆';title='Great job!';}else if(pctPc>=50){emoji='😊';stars='★☆☆';title='Good try!';}else{emoji='💪';stars='☆☆☆';title='Keep going!';}if(passed&&curLevel<3){unlocked[curLevel+1]=true;sub='Level '+(curLevel+1)+' unlocked!';}else if(passed&&curLevel===3){showTrophy(pctPc);return;}else{sub='You need 80% to unlock the next level. ('+pctPc+'%)';}document.getElementById('res-emoji').textContent=emoji;document.getElementById('res-stars').textContent=stars;document.getElementById('res-title').textContent=title;document.getElementById('res-score').textContent=scoreOk+' / '+total+' correct ('+pctPc+'%)';document.getElementById('res-sub').textContent=sub;const btnNL=document.getElementById('btn-next-lvl');btnNL.disabled=!(passed&&curLevel<3);btnNL.textContent=passed&&curLevel<3?'Level '+(curLevel+1)+' ➜':'Locked 🔒';updateBadges();document.getElementById('lvl-result').classList.add('show');}
function showTrophy(pct){document.getElementById('trophy-score').textContent='All 3 levels done! Final score: '+scoreOk+'/'+curSentences.length+' ('+pct+'%)';document.getElementById('trophy-screen').classList.add('show');updateBadges();}
let toastTimer;
function showToast(msg,type,persist=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';clearTimeout(toastTimer);if(!persist)toastTimer=setTimeout(()=>t.classList.remove('show'),1800);t.dataset.persist=persist?'1':'0';}
function clearToast(){const t=document.getElementById('toast');if(t.dataset.persist==='1')t.classList.remove('show');}
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
startLevel(1);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feelings Game</title>
<meta name="description" content="A fun English feelings vocabulary game for primary school students.">
<meta name="theme-color" content="#F5A623">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Feelings Game">
<link rel="manifest" href="manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --cream:  #FFF8F0;
  --ink:    #2C1A0E;
  --warm1:  #F5A623;
  --warm2:  #E8593C;
  --warm3:  #F06292;
  --cool1:  #6A9FCF;
  --green:  #3AAA6A;
  --r:      18px;
  --sh:     0 4px 20px rgba(44,26,14,0.10);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Nunito', sans-serif;
  background: var(--cream);
  background-image:
    radial-gradient(ellipse at 20% 0%, #FFE4C8 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, #FFD6C0 0%, transparent 50%);
  min-height:100vh;
  padding:16px;
  color: var(--ink);
}
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
.title { font-size:clamp(18px,4.5vw,26px); font-weight:900; letter-spacing:-0.5px; color:var(--warm2); }
.title span { color:var(--warm1); }
.score-box { display:flex; gap:7px; align-items:center; }
.pill { background:white; border-radius:30px; padding:5px 14px; font-size:13px; font-weight:700; box-shadow:var(--sh); border:2px solid #F5E0D0; color:var(--ink); }
.pill b { color:var(--warm2); }
.level-bar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
.lvl-badge { padding:6px 18px; border-radius:30px; font-size:13px; font-weight:700; border:2px solid #E0D0C0; color:#C0A898; background:white; transition:all 0.3s; cursor:default; }
.lvl-badge.active { border-color:var(--warm1); color:var(--ink); background:#FFF8E8; box-shadow:0 0 0 3px rgba(245,166,35,0.2); }
.lvl-badge.done   { border-color:var(--green); color:white; background:var(--green); }
.lvl-badge.locked { opacity:0.4; }
.threshold-note { font-size:11px; color:#C0A898; font-style:italic; }
.mode-tabs { display:flex; gap:6px; margin-bottom:14px; background:white; padding:4px; border-radius:40px; width:fit-content; box-shadow:var(--sh); border:2px solid #F0E0D0; }
.tab { padding:7px 18px; border-radius:30px; border:none; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; color:#C0A898; background:transparent; }
.tab.active { background:linear-gradient(135deg,var(--warm1),var(--warm2)); color:white; box-shadow:0 3px 10px rgba(232,89,60,0.35); }
.progress-bar { height:6px; background:#F0E0D0; border-radius:8px; margin-bottom:16px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--warm1),var(--warm2)); border-radius:8px; transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.q-card { background:white; border-radius:var(--r); padding:18px 20px; box-shadow:var(--sh); margin-bottom:14px; text-align:center; border:2px solid #F0E0D0; }
.q-num { font-size:11px; color:#C0A898; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.q-sentence { font-size:clamp(15px,3.5vw,20px); line-height:1.8; font-family:'Lora',serif; }
.q-pro  { font-weight:700; font-family:'Nunito',sans-serif; }
.q-verb { color:var(--cool1); font-weight:700; font-family:'Nunito',sans-serif; }
.q-blank { display:inline-block; border-bottom:2.5px solid #C0A898; min-width:96px; margin:0 5px; vertical-align:middle; padding-bottom:2px; line-height:1.5; font-family:'Nunito',sans-serif; font-weight:700; }
.q-blank.correct      { border-color:var(--green); color:var(--green); }
.q-blank.also-correct { border-color:var(--warm1); color:var(--warm1); }
.q-blank.wrong        { border-color:var(--warm2); color:var(--warm2); }
.q-context { color:#888; font-style:italic; }
.face-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:10px; margin-bottom:12px; }
.face-btn { display:flex; flex-direction:column; align-items:center; gap:6px; background:white; border:2.5px solid #F0E0D0; border-radius:16px; padding:10px 6px 8px; cursor:pointer; transition:all 0.2s; box-shadow:0 2px 8px rgba(44,26,14,0.07); font-family:inherit; }
.face-btn:hover:not(:disabled) { transform:translateY(-4px) scale(1.04); box-shadow:0 8px 22px rgba(44,26,14,0.14); border-color:var(--warm1); }
.face-btn:disabled { cursor:default; }
.face-btn svg { width:62px; height:70px; }
.face-btn .lbl { font-size:9px; text-transform:uppercase; font-weight:900; color:#C0A898; letter-spacing:0.8px; }
.face-btn.correct      { border-color:var(--green); background:#EEFAF3; transform:scale(1.08); box-shadow:0 0 0 3px rgba(58,170,106,0.2); }
.face-btn.correct .lbl { color:var(--green); }
.face-btn.also-correct { border-color:var(--warm1); background:#FFF8E8; transform:scale(1.05); box-shadow:0 0 0 3px rgba(245,166,35,0.2); }
.face-btn.also-correct .lbl { color:var(--warm1); }
.face-btn.wrong { border-color:var(--warm2); background:#FFF0EE; animation:shake 0.3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.drag-zone { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; justify-content:center; }
.drag-chip { padding:7px 16px; background:white; border:2px solid #F0E0D0; border-radius:30px; font-family:inherit; font-size:13px; font-weight:700; color:var(--ink); cursor:pointer; transition:all 0.15s; box-shadow:0 2px 7px rgba(44,26,14,0.07); }
.drag-chip:hover { background:#FFF8F0; border-color:var(--warm1); transform:scale(1.05); }
.drag-chip.used  { opacity:0.2; pointer-events:none; }
.drag-chip.also-correct-chip { border-color:var(--warm1) !important; }
.drop-target { display:inline-block; min-width:96px; height:28px; border-bottom:2.5px dashed #C0A898; margin:0 4px; vertical-align:bottom; text-align:center; line-height:28px; font-weight:700; font-size:14px; transition:all 0.15s; cursor:pointer; font-family:'Nunito',sans-serif; }
.drop-target.drag-over    { border-color:var(--warm1); background:#FFF8F0; border-radius:6px; }
.drop-target.correct      { border-color:var(--green); color:var(--green); border-style:solid; }
.drop-target.also-correct { border-color:var(--warm1); color:var(--warm1); border-style:solid; }
.drop-target.wrong        { border-color:var(--warm2); color:var(--warm2); border-style:solid; }
.toast { position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-90px); background:white; border-radius:30px; padding:11px 26px; font-size:15px; font-weight:700; box-shadow:0 8px 30px rgba(44,26,14,0.15); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:999; border:3px solid #eee; pointer-events:none; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.ok   { border-color:var(--green); color:var(--green); }
.toast.also { border-color:var(--warm1); color:#C07800; }
.toast.bad  { border-color:var(--warm2); color:var(--warm2); }
.btn-next { display:none; background:linear-gradient(135deg,var(--warm1),var(--warm2)); color:white; border:none; border-radius:30px; padding:11px 28px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(232,89,60,0.35); margin:6px auto; transition:transform 0.15s; letter-spacing:0.3px; }
.btn-next:hover { transform:scale(1.04); }
.btn-next.visible { display:block; }
.lvl-result { display:none; text-align:center; background:white; border-radius:var(--r); padding:30px 20px; box-shadow:var(--sh); border:2px solid #F0E0D0; }
.lvl-result.show { display:block; }
.res-emoji { font-size:58px; margin-bottom:8px; }
.res-stars { font-size:32px; letter-spacing:5px; margin-bottom:8px; color:var(--warm1); }
.res-title { font-size:24px; font-weight:900; color:var(--warm2); margin-bottom:6px; }
.res-score { font-size:16px; color:#888; margin-bottom:20px; font-family:'Lora',serif; }
.res-sub   { font-size:13px; color:#B0A098; margin-bottom:20px; font-style:italic; }
.btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.btn { border:none; border-radius:30px; padding:11px 26px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; transition:transform 0.15s; box-shadow:0 3px 12px rgba(44,26,14,0.12); }
.btn:hover { transform:scale(1.05); }
.btn-retry    { background:linear-gradient(135deg,#F0E0D0,#E8C8B0); color:var(--ink); }
.btn-next-lvl { background:linear-gradient(135deg,var(--warm1),var(--warm2)); color:white; }
.btn-next-lvl:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
.trophy-screen { display:none; text-align:center; background:white; border-radius:var(--r); padding:36px 20px; box-shadow:var(--sh); border:3px solid var(--warm1); }
.trophy-screen.show { display:block; }
.trophy-emoji { font-size:76px; margin-bottom:10px; }
.trophy-title { font-size:28px; font-weight:900; color:var(--warm2); margin-bottom:8px; }
.trophy-score { font-size:16px; color:#888; margin-bottom:22px; font-family:'Lora',serif; }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">Feelings <span>Game</span></div>
  <div class="score-box">
    <div class="pill">✓ <b id="score-ok">0</b></div>
    <div class="pill">✗ <b id="score-bad">0</b></div>
    <div class="pill" id="pill-q">Q <b id="q-idx">1</b>/<b id="q-total">6</b></div>
  </div>
</div>

<div class="level-bar">
  <div class="lvl-badge active" id="badge-1">★ Level 1</div>
  <div class="lvl-badge locked" id="badge-2">★★ Level 2 🔒</div>
  <div class="lvl-badge locked" id="badge-3">★★★ Level 3 🔒</div>
  <span class="threshold-note">80% to unlock the next level</span>
</div>

<div class="mode-tabs">
  <button class="tab active" id="tab-a" onclick="switchMode('a')">👤 Find the face</button>
  <button class="tab"        id="tab-b" onclick="switchMode('b')">✏️ Fill the gap</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="q-card" id="q-card">
  <div class="q-num" id="q-num">Question 1 / 6</div>
  <div class="q-sentence" id="q-sentence"></div>
</div>

<div class="face-grid" id="mode-a"></div>
<div class="drag-zone"  id="mode-b" style="display:none"></div>
<button class="btn-next" id="btn-next" onclick="nextQuestion()">Next ➜</button>

<div class="lvl-result" id="lvl-result">
  <div class="res-emoji" id="res-emoji"></div>
  <div class="res-stars" id="res-stars"></div>
  <div class="res-title" id="res-title"></div>
  <div class="res-score" id="res-score"></div>
  <div class="res-sub"   id="res-sub"></div>
  <div class="btn-row">
    <button class="btn btn-retry"    onclick="retryLevel()">Try again 🔄</button>
    <button class="btn btn-next-lvl" id="btn-next-lvl" onclick="startNextLevel()">Next level ➜</button>
  </div>
</div>

<div class="trophy-screen" id="trophy-screen">
  <div class="trophy-emoji">🏆</div>
  <div class="trophy-title">All levels done!</div>
  <div class="trophy-score" id="trophy-score"></div>
  <div class="btn-row" style="margin-top:18px;">
    <button class="btn btn-retry" onclick="fullRestart()">Play again 🔄</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const THRESHOLD=0.8;
const LEVEL_ADJS={
  1:[...new Set(SENTENCE_POOL.filter(s=>s.level===1).map(s=>s.adj))],
  2:[...new Set(SENTENCE_POOL.filter(s=>s.level<=2).map(s=>s.adj))],
  3:[...new Set(SENTENCE_POOL.map(s=>s.adj))],
};

function buildLevelSentences(lvl){
  return LEVEL_ADJS[lvl].map(adj=>{
    const v=SENTENCE_POOL.filter(s=>s.adj===adj&&s.level<=lvl);
    return v[Math.floor(Math.random()*v.length)];
  });
}

const unlocked={1:true,2:false,3:false};
let mode='a',curLevel=1,order=[],qIdx=0,scoreOk=0,scoreBad=0,answered=false,dragWord=null;
let curSentences=[],curWords=[];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function updateBadges(){
  for(let l=1;l<=3;l++){
    const b=document.getElementById(`badge-${l}`);
    b.className='lvl-badge';
    if(l===curLevel) b.classList.add('active');
    else if(unlocked[l]) b.classList.add('done');
    else b.classList.add('locked');
  }
}

function startLevel(lvl){
  curLevel=lvl;scoreOk=scoreBad=0;qIdx=0;answered=false;
  curSentences=buildLevelSentences(lvl);curWords=LEVEL_ADJS[lvl];
  order=shuffle([...Array(curSentences.length).keys()]);
  document.getElementById('score-ok').textContent=0;
  document.getElementById('score-bad').textContent=0;
  document.getElementById('q-total').textContent=curSentences.length;
  document.getElementById('lvl-result').classList.remove('show');
  document.getElementById('trophy-screen').classList.remove('show');
  document.getElementById('q-card').style.display='';
  document.getElementById('pill-q').style.display='';
  document.getElementById('progress').style.width='0%';
  updateBadges();renderQuestion();
}

function retryLevel(){startLevel(curLevel);}
function startNextLevel(){startLevel(curLevel+1);}
function fullRestart(){unlocked[2]=false;unlocked[3]=false;startLevel(1);}
function switchMode(m){mode=m;document.getElementById('tab-a').classList.toggle('active',m==='a');document.getElementById('tab-b').classList.toggle('active',m==='b');startLevel(curLevel);}

function renderQuestion(){
  answered=false;
  document.getElementById('btn-next').classList.remove('visible');
  const total=curSentences.length,s=curSentences[order[qIdx]];
  document.getElementById('q-num').textContent=`Question ${qIdx+1} / ${total}`;
  document.getElementById('q-idx').textContent=qIdx+1;
  document.getElementById('progress').style.width=`${(qIdx/total)*100}%`;
  if(mode==='a') renderModeA(s); else renderModeB(s);
}

function sentenceHTML(s,blankTag){
  return `<span class="q-pro">${s.pronoun}</span> <span class="q-verb">${s.verb}</span> ${blankTag} <span class="q-context">${s.context}</span>`;
}

function renderModeA(s){
  document.getElementById('mode-a').style.display='';
  document.getElementById('mode-b').style.display='none';
  document.getElementById('q-sentence').innerHTML=sentenceHTML(s,'<span class="q-blank" id="the-blank">___</span>');
  const names=shuffle([...curWords]);
  const grid=document.getElementById('mode-a');
  grid.innerHTML='';
  names.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='face-btn';
    btn.innerHTML=(FACES[name]||`<svg viewBox="0 0 80 90" width="62" height="70"></svg>`)+`<span class="lbl">${name}</span>`;
    btn.dataset.name=name;
    btn.onclick=()=>handleFaceClick(name,s.adj,btn);
    grid.appendChild(btn);
  });
}

function handleFaceClick(chosen,correct,btn){
  if(answered)return;answered=true;
  const s=curSentences[order[qIdx]],also=s.also||[];
  const blank=document.getElementById('the-blank');
  document.querySelectorAll('.face-btn').forEach(b=>b.disabled=true);
  document.querySelectorAll('.face-btn').forEach(b=>{if(b.dataset.name===correct)b.classList.add('correct');});
  document.querySelectorAll('.face-btn').forEach(b=>{if(also.includes(b.dataset.name))b.classList.add('also-correct');});
  if(chosen===correct){blank.textContent=correct;blank.classList.add('correct');scoreOk++;document.getElementById('score-ok').textContent=scoreOk;showToast('✓ Well done!','ok');}
  else if(also.includes(chosen)){blank.textContent=chosen;blank.classList.add('also-correct');scoreOk++;document.getElementById('score-ok').textContent=scoreOk;showToast(`✓ Also correct! Best: ${correct}`,'also',true);}
  else{btn.classList.add('wrong');blank.textContent=chosen;blank.classList.add('wrong');scoreBad++;document.getElementById('score-bad').textContent=scoreBad;const hint=also.length?` (also: ${also.join(', ')})`:'';showToast(`✗ It was: ${correct}${hint}`,'bad');}
  document.getElementById('btn-next').classList.add('visible');
  document.getElementById('btn-next').textContent=qIdx+1>=curSentences.length?'See results 🏆':'Next ➜';
}

function renderModeB(s){
  document.getElementById('mode-a').style.display='none';
  document.getElementById('mode-b').style.display='';
  document.getElementById('q-sentence').innerHTML=sentenceHTML(s,'<span class="drop-target" id="the-drop" ondragover="dragOver(event)" ondrop="dropWord(event)"></span>');
  const words=shuffle([...curWords]);
  const zone=document.getElementById('mode-b');zone.innerHTML='';
  words.forEach(w=>{
    const chip=document.createElement('div');
    chip.className='drag-chip';chip.textContent=w;chip.dataset.word=w;chip.draggable=true;
    chip.ondragstart=()=>{dragWord=w;chip.classList.add('dragging');};
    chip.ondragend=()=>chip.classList.remove('dragging');
    chip.onclick=()=>handleChipClick(w,s.adj);
    zone.appendChild(chip);
  });
}

function dragOver(e){e.preventDefault();document.getElementById('the-drop').classList.add('drag-over');}
function dropWord(e){e.preventDefault();if(answered)return;handleChipClick(dragWord,curSentences[order[qIdx]].adj);}

function handleChipClick(chosen,correct){
  if(answered)return;answered=true;
  const s=curSentences[order[qIdx]],also=s.also||[];
  const drop=document.getElementById('the-drop');
  drop.classList.remove('drag-over');drop.textContent=chosen;
  document.querySelectorAll('.drag-chip').forEach(c=>{
    c.style.pointerEvents='none';
    if(c.dataset.word===correct)c.style.borderColor='var(--green)';
    if(also.includes(c.dataset.word))c.classList.add('also-correct-chip');
    if(c.dataset.word===chosen)c.classList.add('used');
  });
  if(chosen===correct){drop.classList.add('correct');scoreOk++;document.getElementById('score-ok').textContent=scoreOk;showToast('✓ Well done!','ok');}
  else if(also.includes(chosen)){drop.classList.add('also-correct');scoreOk++;document.getElementById('score-ok').textContent=scoreOk;showToast(`✓ Also correct! Best: ${correct}`,'also',true);}
  else{drop.classList.add('wrong');scoreBad++;document.getElementById('score-bad').textContent=scoreBad;const hint=also.length?` (also: ${also.join(', ')})`:'';showToast(`✗ It was: ${correct}${hint}`,'bad');}
  document.getElementById('btn-next').classList.add('visible');
  document.getElementById('btn-next').textContent=qIdx+1>=curSentences.length?'See results 🏆':'Next ➜';
}

function nextQuestion(){clearToast();qIdx++;if(qIdx>=curSentences.length)showLevelResult();else renderQuestion();}

function showLevelResult(){
  const total=curSentences.length,pct=scoreOk/total,pctPc=Math.round(pct*100),passed=pct>=THRESHOLD;
  document.getElementById('q-card').style.display='none';
  document.getElementById('mode-a').style.display='none';
  document.getElementById('mode-b').style.display='none';
  document.getElementById('btn-next').classList.remove('visible');
  document.getElementById('pill-q').style.display='none';
  document.getElementById('progress').style.width='100%';
  let emoji,stars,title,sub;
  if(pctPc===100){emoji='🏆';stars='★★★';title='Perfect!';}
  else if(pctPc>=80){emoji='🎉';stars='★★☆';title='Great job!';}
  else if(pctPc>=50){emoji='😊';stars='★☆☆';title='Good try!';}
  else{emoji='💪';stars='☆☆☆';title='Keep going!';}
  if(passed&&curLevel<3){unlocked[curLevel+1]=true;sub=`Level ${curLevel+1} unlocked! ✓`;}
  else if(passed&&curLevel===3){showTrophy(pctPc);return;}
  else{sub=`You need 80% to unlock the next level. (You got ${pctPc}%)`;}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-stars').textContent=stars;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-score').textContent=`${scoreOk} / ${total} correct (${pctPc}%)`;
  document.getElementById('res-sub').textContent=sub;
  const btnNL=document.getElementById('btn-next-lvl');
  if(passed&&curLevel<3){btnNL.disabled=false;btnNL.textContent=`Level ${curLevel+1} ➜`;}
  else{btnNL.disabled=true;btnNL.textContent='Locked 🔒';}
  updateBadges();
  document.getElementById('lvl-result').classList.add('show');
}

function showTrophy(pct){
  document.getElementById('trophy-score').textContent=`You completed all 3 levels! Final score: ${scoreOk}/${curSentences.length} (${pct}%)`;
  document.getElementById('trophy-screen').classList.add('show');
  updateBadges();
}

let toastTimer;
function showToast(msg,type,persist=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(toastTimer);
  if(!persist)toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
  t.dataset.persist=persist?'1':'0';
}
function clearToast(){const t=document.getElementById('toast');if(t.dataset.persist==='1')t.classList.remove('show');}

startLevel(1);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>console.log('SW:',r.scope))
      .catch(e=>console.warn('SW fail:',e));
  });
}

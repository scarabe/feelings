<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🐱 Feelings Game</title>
<style>
:root {
  --pink:  #e0789f;
  --blue:  #2a6dd9;
  --green: #3cb86a;
  --red:   #e04040;
  --gold:  #f0a020;
  --bg:    #fff8fc;
  --card:  #ffffff;
  --r:     16px;
  --sh:    0 3px 12px rgba(0,0,0,0.10);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:"Comic Sans MS","Chalkboard SE",cursive;
  background:var(--bg);
  background-image:radial-gradient(circle,#f8c8dc 1px,transparent 1px);
  background-size:18px 18px;
  min-height:100vh;
  padding:14px;
  color:#333;
}

/* ── TOP BAR ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px; flex-wrap:wrap; gap:8px;
}
.title {
  font-size:clamp(17px,4vw,24px); font-weight:bold;
  background:linear-gradient(135deg,#ff9ec4,#ffb347,#a8e6cf,#9ec4ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.score-box { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.pill {
  background:white; border-radius:20px; padding:4px 12px;
  font-size:13px; font-weight:bold; box-shadow:var(--sh);
  border:2px solid #ffaac8;
}
.pill span { color:var(--pink); }

/* ── LEVEL BADGES ── */
.level-bar {
  display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center;
}
.lvl-badge {
  padding:5px 16px; border-radius:20px; font-size:13px; font-weight:bold;
  border:2.5px solid #ddd; color:#bbb; background:white;
  transition:all 0.3s; position:relative; cursor:default;
}
.lvl-badge.active  { border-color:var(--gold); color:var(--gold); box-shadow:0 0 0 3px rgba(240,160,32,0.15); }
.lvl-badge.done    { border-color:var(--green); color:white; background:var(--green); }
.lvl-badge.locked  { opacity:0.45; }
.lvl-badge .lock   { font-size:11px; margin-left:4px; }
.threshold-note { font-size:11px; color:#aaa; font-style:italic; }

/* ── MODE TABS ── */
.mode-tabs {
  display:flex; gap:8px; margin-bottom:12px;
  background:white; padding:4px; border-radius:30px;
  width:fit-content; box-shadow:var(--sh);
}
.tab {
  padding:6px 16px; border-radius:24px; border:none;
  font-family:inherit; font-size:13px; font-weight:bold;
  cursor:pointer; transition:all 0.2s; color:#999; background:transparent;
}
.tab.active {
  background:linear-gradient(135deg,#ff9ec4,#ffb880);
  color:white; box-shadow:0 2px 8px rgba(224,120,159,0.4);
}

/* ── PROGRESS ── */
.progress-bar {
  height:7px; background:#f0d8e8; border-radius:8px;
  margin-bottom:14px; overflow:hidden;
}
.progress-fill {
  height:100%;
  background:linear-gradient(90deg,#ff9ec4,#ffb347);
  border-radius:8px; transition:width 0.4s ease;
}

/* ── QUESTION CARD ── */
.q-card {
  background:var(--card); border-radius:var(--r); padding:16px 18px;
  box-shadow:var(--sh); margin-bottom:14px; text-align:center;
  border:2px solid #ffe0ee;
}
.q-num { font-size:11px; color:#ccc; margin-bottom:4px; }
.q-sentence { font-size:clamp(14px,3vw,19px); line-height:1.7; }
.q-pro  { font-weight:bold; }
.q-verb { color:var(--blue); font-weight:bold; }
.q-blank {
  display:inline-block; border-bottom:2.5px solid #aaa;
  min-width:88px; margin:0 4px; vertical-align:middle;
  padding-bottom:3px; line-height:1.4;
}
.q-blank.correct      { border-color:var(--green);  color:var(--green);  font-weight:bold; }
.q-blank.also-correct { border-color:#f0a020;    color:#f0a020;    font-weight:bold; }
.q-blank.wrong        { border-color:var(--red);   color:var(--red);   font-weight:bold; }
.cat-btn.also-correct { border-color:#f0a020; background:#fffbe8; transform:scale(1.05); box-shadow:0 0 0 3px rgba(240,160,32,0.2); }
.drag-chip.also-correct-chip { border-color:#f0a020 !important; }
.q-context { color:#555; }

/* ── MODE A: CAT GRID ── */
.cat-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
  gap:7px; margin-bottom:12px;
}
.cat-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:white; border:2.5px solid #eee; border-radius:14px;
  padding:7px 3px 5px; cursor:pointer; transition:all 0.18s;
  box-shadow:0 2px 6px rgba(0,0,0,0.06); font-family:inherit;
}
.cat-btn:hover:not(:disabled) {
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 6px 16px rgba(224,120,159,0.25);
  border-color:var(--pink);
}
.cat-btn:disabled { cursor:default; opacity:0.55; }
.cat-btn svg { width:52px; height:52px; }
.cat-btn .lbl { font-size:8.5px; text-transform:uppercase; font-weight:bold; color:#aaa; letter-spacing:0.3px; }
.cat-btn.correct { border-color:var(--green); background:#efffef; transform:scale(1.08); box-shadow:0 0 0 3px rgba(60,184,106,0.2); }
.cat-btn.wrong   { border-color:var(--red);   background:#fff0f0; animation:shake 0.3s ease; }
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25%      { transform:translateX(-5px); }
  75%      { transform:translateX(5px); }
}

/* ── MODE B: CHIPS ── */
.drag-zone {
  display:flex; flex-wrap:wrap; gap:7px;
  margin-bottom:12px; justify-content:center;
}
.drag-chip {
  padding:6px 13px; background:white; border:2px solid #ffaac8;
  border-radius:20px; font-family:inherit; font-size:13px; font-weight:bold;
  color:#555; cursor:pointer; transition:all 0.15s;
  box-shadow:0 2px 6px rgba(0,0,0,0.07);
}
.drag-chip:hover { background:#fff0f6; transform:scale(1.05); }
.drag-chip.used  { opacity:0.25; pointer-events:none; }
.drop-target {
  display:inline-block; min-width:88px; height:26px;
  border-bottom:2.5px dashed #ccc; margin:0 3px;
  vertical-align:bottom; text-align:center; line-height:26px;
  font-weight:bold; font-size:14px; transition:all 0.15s; cursor:pointer;
}
.drop-target.drag-over { border-color:var(--pink); background:#fff0f6; border-radius:6px; }
.drop-target.correct      { border-color:var(--green); color:var(--green); border-style:solid; }
.drop-target.also-correct { border-color:#f0a020;   color:#d08000;   border-style:solid; }
.drop-target.wrong        { border-color:var(--red);   color:var(--red);   border-style:solid; }

/* ── TOAST ── */
.toast {
  position:fixed; top:18px; left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:white; border-radius:30px; padding:11px 26px;
  font-size:17px; font-weight:bold; box-shadow:0 8px 30px rgba(0,0,0,0.15);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index:999; border:3px solid #eee; pointer-events:none; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.ok   { border-color:var(--green); color:var(--green); }
.toast.also { border-color:#f0a020;   color:#d08000; }
.toast.bad  { border-color:var(--red);   color:var(--red);   }

/* ── LEVEL RESULT SCREEN ── */
.lvl-result {
  display:none; text-align:center; background:white;
  border-radius:var(--r); padding:28px 20px;
  box-shadow:var(--sh); border:2px solid #ffe0ee;
}
.lvl-result.show { display:block; }
.res-emoji { font-size:56px; margin-bottom:8px; }
.res-stars { font-size:30px; letter-spacing:4px; margin-bottom:6px; }
.res-title { font-size:22px; font-weight:bold; color:var(--pink); margin-bottom:6px; }
.res-score { font-size:16px; color:#555; margin-bottom:18px; }
.res-sub   { font-size:13px; color:#999; margin-bottom:18px; font-style:italic; }

.btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.btn {
  border:none; border-radius:24px; padding:10px 26px;
  font-family:inherit; font-size:14px; font-weight:bold;
  cursor:pointer; transition:transform 0.15s;
  box-shadow:0 3px 10px rgba(0,0,0,0.10);
}
.btn:hover { transform:scale(1.05); }
.btn-retry  { background:linear-gradient(135deg,#ffb347,#ff9ec4); color:white; }
.btn-next-lvl { background:linear-gradient(135deg,#a8e6cf,#9ec4ff); color:#333; }
.btn-next-lvl:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

/* ── NEXT BTN ── */
.btn-next {
  display:none; background:linear-gradient(135deg,#a8e6cf,#9ec4ff);
  color:#333; border:none; border-radius:24px; padding:9px 26px;
  font-family:inherit; font-size:14px; font-weight:bold;
  cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.10);
  margin:6px auto; transition:transform 0.15s;
}
.btn-next:hover { transform:scale(1.04); }
.btn-next.visible { display:block; }

/* ── FINAL TROPHY ── */
.trophy-screen {
  display:none; text-align:center; background:white;
  border-radius:var(--r); padding:32px 20px;
  box-shadow:var(--sh); border:3px solid var(--gold);
}
.trophy-screen.show { display:block; }
.trophy-emoji { font-size:72px; margin-bottom:10px; }
.trophy-title { font-size:26px; font-weight:bold; color:var(--gold); margin-bottom:8px; }
.trophy-score { font-size:16px; color:#555; margin-bottom:20px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">🐱 Feelings Game</div>
  <div class="score-box">
    <div class="pill">✅ <span id="score-ok">0</span></div>
    <div class="pill">❌ <span id="score-bad">0</span></div>
    <div class="pill" id="pill-q">Q <span id="q-idx">1</span>/<span id="q-total">6</span></div>
  </div>
</div>

<div class="level-bar">
  <div class="lvl-badge active" id="badge-1">⭐ Level 1</div>
  <div class="lvl-badge locked" id="badge-2">⭐⭐ Level 2 <span class="lock">🔒</span></div>
  <div class="lvl-badge locked" id="badge-3">⭐⭐⭐ Level 3 <span class="lock">🔒</span></div>
  <span class="threshold-note">80% needed to unlock next level</span>
</div>

<div class="mode-tabs">
  <button class="tab active" id="tab-a" onclick="switchMode('a')">🐱 Find the cat</button>
  <button class="tab"        id="tab-b" onclick="switchMode('b')">✏️ Fill the gap</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="q-card" id="q-card">
  <div class="q-num" id="q-num">Question 1 / 6</div>
  <div class="q-sentence" id="q-sentence"></div>
</div>

<div class="cat-grid" id="mode-a"></div>
<div class="drag-zone" id="mode-b" style="display:none"></div>
<button class="btn-next" id="btn-next" onclick="nextQuestion()">Next ➜</button>

<!-- Level result -->
<div class="lvl-result" id="lvl-result">
  <div class="res-emoji"  id="res-emoji"></div>
  <div class="res-stars"  id="res-stars"></div>
  <div class="res-title"  id="res-title"></div>
  <div class="res-score"  id="res-score"></div>
  <div class="res-sub"    id="res-sub"></div>
  <div class="btn-row">
    <button class="btn btn-retry"   onclick="retryLevel()">Try again 🔄</button>
    <button class="btn btn-next-lvl" id="btn-next-lvl" onclick="startNextLevel()">Next level ➜</button>
  </div>
</div>

<!-- Trophy -->
<div class="trophy-screen" id="trophy-screen">
  <div class="trophy-emoji">🏆</div>
  <div class="trophy-title">Amazing! All levels done!</div>
  <div class="trophy-score" id="trophy-score"></div>
  <div class="btn-row" style="margin-top:16px;">
    <button class="btn btn-retry" onclick="fullRestart()">Play again from start 🔄</button>
  </div>
</div>

<div class="toast" id="toast"></div>

// Unique adjectives per level (cumulative)
const LEVEL_ADJS = {
  1: [...new Set(SENTENCE_POOL.filter(s=>s.level===1).map(s=>s.adj))],
  2: [...new Set(SENTENCE_POOL.filter(s=>s.level<=2).map(s=>s.adj))],
  3: [...new Set(SENTENCE_POOL.map(s=>s.adj))],
};

// Build a randomised set of sentences for a level:
// one randomly-picked variant per adjective in scope
function buildLevelSentences(lvl) {
  const adjs = LEVEL_ADJS[lvl];
  return adjs.map(adj => {
    const variants = SENTENCE_POOL.filter(s => s.adj === adj && s.level <= lvl);
    return variants[Math.floor(Math.random() * variants.length)];
  });
}

// Unlocked state persisted in memory
const unlocked = {1:true, 2:false, 3:false};

let mode     = 'a';
let curLevel = 1;
let order    = [];
let qIdx     = 0;
let scoreOk  = 0;
let scoreBad = 0;
let answered = false;
let dragWord = null;

// ── UTILS ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ── BADGE UPDATE ──────────────────────────────────────────────────────────
function updateBadges() {
  for(let l=1;l<=3;l++) {
    const b = document.getElementById(`badge-${l}`);
    b.className = 'lvl-badge';
    if(l === curLevel)        b.classList.add('active');
    else if(unlocked[l])      b.classList.add('done');
    else                      b.classList.add('locked');
    const lock = b.querySelector('.lock');
    if(lock) lock.style.display = unlocked[l]||l===curLevel ? 'none' : '';
  }
}

// ── START LEVEL ──────────────────────────────────────────────────────────
// Current level's sentences (rebuilt randomly each play)
let curSentences = [];
let curWords = [];

function startLevel(lvl) {
  curLevel = lvl;
  scoreOk = scoreBad = 0;
  qIdx = 0;
  answered = false;
  curSentences = buildLevelSentences(lvl);
  curWords = LEVEL_ADJS[lvl];
  order = shuffle([...Array(curSentences.length).keys()]);
  document.getElementById('score-ok').textContent  = 0;
  document.getElementById('score-bad').textContent = 0;
  document.getElementById('q-total').textContent   = curSentences.length;
  document.getElementById('lvl-result').classList.remove('show');
  document.getElementById('trophy-screen').classList.remove('show');
  document.getElementById('q-card').style.display  = '';
  document.getElementById('pill-q').style.display  = '';
  document.getElementById('progress').style.width  = '0%';
  updateBadges();
  renderQuestion();
}

function retryLevel()    { startLevel(curLevel); }
function startNextLevel() { startLevel(curLevel+1); }
function fullRestart()    { unlocked[2]=false; unlocked[3]=false; startLevel(1); }

function switchMode(m) {
  mode = m;
  document.getElementById('tab-a').classList.toggle('active', m==='a');
  document.getElementById('tab-b').classList.toggle('active', m==='b');
  startLevel(curLevel);
}

// ── RENDER QUESTION ──────────────────────────────────────────────────────
function renderQuestion() {
  answered = false;
  document.getElementById('btn-next').classList.remove('visible');
  const total = curSentences.length;
  const s     = curSentences[order[qIdx]];
  document.getElementById('q-num').textContent  = `Question ${qIdx+1} / ${total}`;
  document.getElementById('q-idx').textContent  = qIdx+1;
  document.getElementById('progress').style.width = `${(qIdx/total)*100}%`;
  if(mode==='a') renderModeA(s);
  else           renderModeB(s);
}

function sentenceHTML(s, blankTag) {
  return `<span class="q-pro">${s.pronoun}</span> `
       + `<span class="q-verb">${s.verb}</span> `
       + blankTag + ` `
       + `<span class="q-context">${s.context}</span>`;
}

// ── MODE A ────────────────────────────────────────────────────────────────
function renderModeA(s) {
  document.getElementById('mode-a').style.display='';
  document.getElementById('mode-b').style.display='none';
  document.getElementById('q-sentence').innerHTML =
    sentenceHTML(s, '<span class="q-blank" id="the-blank">___</span>');

  const catNames = shuffle([...curWords]);
  const grid = document.getElementById('mode-a');
  grid.innerHTML='';
  catNames.forEach(name => {
    const btn = document.createElement('button');
    btn.className='cat-btn';
    btn.innerHTML = CATS[name] + `<span class="lbl">${name}</span>`;
    btn.dataset.name=name;
    btn.onclick = ()=>handleCatClick(name, s.adj, btn);
    grid.appendChild(btn);
  });
}

function handleCatClick(chosen, correct, btn) {
  if(answered) return;
  answered=true;
  const s = curSentences[order[qIdx]];
  const also = s.also || [];
  const blank = document.getElementById('the-blank');
  document.querySelectorAll('.cat-btn').forEach(b=>b.disabled=true);
  // Always highlight the primary correct cat in green
  document.querySelectorAll('.cat-btn').forEach(b=>{ if(b.dataset.name===correct) b.classList.add('correct'); });
  // Highlight also-correct cats in amber
  document.querySelectorAll('.cat-btn').forEach(b=>{ if(also.includes(b.dataset.name)) b.classList.add('also-correct'); });

  if(chosen===correct) {
    blank.textContent=correct; blank.classList.add('correct');
    scoreOk++; document.getElementById('score-ok').textContent=scoreOk;
    showToast('✅ Well done!','ok');
  } else if(also.includes(chosen)) {
    btn.classList.remove('also-correct'); btn.classList.add('also-correct');
    blank.textContent=chosen; blank.classList.add('also-correct');
    scoreOk++; document.getElementById('score-ok').textContent=scoreOk;
    showToast(`✅ Also correct! Best answer: ${correct}`,'also',true);
  } else {
    btn.classList.add('wrong');
    blank.textContent=chosen; blank.classList.add('wrong');
    scoreBad++; document.getElementById('score-bad').textContent=scoreBad;
    const hint = also.length ? ` (also: ${also.join(', ')})` : '';
    showToast(`❌ It was: ${correct}${hint}`,'bad');
  }
  document.getElementById('btn-next').classList.add('visible');
  document.getElementById('btn-next').textContent =
    qIdx+1>=curSentences.length ? 'See results 🏆' : 'Next ➜';
}

// ── MODE B ────────────────────────────────────────────────────────────────
function renderModeB(s) {
  document.getElementById('mode-a').style.display='none';
  document.getElementById('mode-b').style.display='';
  document.getElementById('q-sentence').innerHTML =
    sentenceHTML(s, '<span class="drop-target" id="the-drop" '
      +'ondragover="dragOver(event)" ondrop="dropWord(event)"></span>');

  const words = shuffle([...curWords]);
  const zone  = document.getElementById('mode-b');
  zone.innerHTML='';
  words.forEach(w=>{
    const chip=document.createElement('div');
    chip.className='drag-chip'; chip.textContent=w; chip.dataset.word=w;
    chip.draggable=true;
    chip.ondragstart=()=>{ dragWord=w; chip.classList.add('dragging'); };
    chip.ondragend=()=>chip.classList.remove('dragging');
    chip.onclick=()=>handleChipClick(w, s.adj);
    zone.appendChild(chip);
  });
}

function dragOver(e) { e.preventDefault(); document.getElementById('the-drop').classList.add('drag-over'); }
function dropWord(e) { e.preventDefault(); if(answered) return; handleChipClick(dragWord, curSentences[order[qIdx]].adj); }

function handleChipClick(chosen, correct) {
  if(answered) return;
  answered=true;
  const s = curSentences[order[qIdx]];
  const also = s.also || [];
  const drop = document.getElementById('the-drop');
  drop.classList.remove('drag-over'); drop.textContent=chosen;
  document.querySelectorAll('.drag-chip').forEach(c=>{
    c.style.pointerEvents='none';
    if(c.dataset.word===correct) c.style.border='2px solid var(--green)';
    if(also.includes(c.dataset.word)) c.classList.add('also-correct-chip');
    if(c.dataset.word===chosen) c.classList.add('used');
  });
  if(chosen===correct) {
    drop.classList.add('correct');
    scoreOk++; document.getElementById('score-ok').textContent=scoreOk;
    showToast('✅ Well done!','ok');
  } else if(also.includes(chosen)) {
    drop.classList.add('also-correct');
    scoreOk++; document.getElementById('score-ok').textContent=scoreOk;
    showToast(`✅ Also correct! Best answer: ${correct}`,'also',true);
  } else {
    drop.classList.add('wrong');
    scoreBad++; document.getElementById('score-bad').textContent=scoreBad;
    const hint = also.length ? ` (also: ${also.join(', ')})` : '';
    showToast(`❌ It was: ${correct}${hint}`,'bad');
  }
  document.getElementById('btn-next').classList.add('visible');
  document.getElementById('btn-next').textContent =
    qIdx+1>=curSentences.length ? 'See results 🏆' : 'Next ➜';
}

// ── NEXT ──────────────────────────────────────────────────────────────────
function nextQuestion() {
  clearToast();
  qIdx++;
  if(qIdx>=curSentences.length) showLevelResult();
  else renderQuestion();
}

// ── LEVEL RESULT ──────────────────────────────────────────────────────────
function showLevelResult() {
  const total = curSentences.length;
  const pct   = scoreOk / total;
  const pctPc = Math.round(pct*100);
  const passed = pct >= THRESHOLD;

  document.getElementById('q-card').style.display='none';
  document.getElementById('mode-a').style.display='none';
  document.getElementById('mode-b').style.display='none';
  document.getElementById('btn-next').classList.remove('visible');
  document.getElementById('pill-q').style.display='none';
  document.getElementById('progress').style.width='100%';

  let emoji, stars, title, sub;
  if(pctPc===100) { emoji='🏆'; stars='★★★'; title='Perfect!'; }
  else if(pctPc>=80) { emoji='🎉'; stars='★★☆'; title='Great job!'; }
  else if(pctPc>=50) { emoji='😊'; stars='★☆☆'; title='Good try!'; }
  else               { emoji='💪'; stars='☆☆☆'; title='Keep going!'; }

  if(passed && curLevel<3) {
    unlocked[curLevel+1]=true;
    sub=`✅ Level ${curLevel+1} unlocked!`;
  } else if(passed && curLevel===3) {
    showTrophy(pctPc); return;
  } else {
    sub=`You need 80% to unlock the next level. (You got ${pctPc}%)`;
  }

  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-stars').textContent=stars;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-score').textContent=`${scoreOk} / ${total} correct (${pctPc}%)`;
  document.getElementById('res-sub').textContent=sub;

  const btnNL=document.getElementById('btn-next-lvl');
  if(passed && curLevel<3) {
    btnNL.disabled=false;
    btnNL.textContent=`Level ${curLevel+1} ➜`;
  } else {
    btnNL.disabled=true;
    btnNL.textContent='Locked 🔒';
  }

  updateBadges();
  document.getElementById('lvl-result').classList.add('show');
}

function showTrophy(pct) {
  document.getElementById('trophy-score').textContent=
    `You completed all 3 levels! Final score: ${scoreOk}/${curSentences.length} (${pct}%)`;
  document.getElementById('trophy-screen').classList.add('show');
  updateBadges();
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type, persist=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  clearTimeout(toastTimer);
  if(!persist) {
    toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
  }
  // store whether current toast is persistent so nextQuestion can clear it
  t.dataset.persist = persist ? '1' : '0';
}
function clearToast() {
  const t=document.getElementById('toast');
  if(t.dataset.persist==='1') t.classList.remove('show');
}

// ── START ─────────────────────────────────────────────────────────────────
startLevel(1);
</script>
